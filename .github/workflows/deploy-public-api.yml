name: Deploy - Public API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        run: echo "::notice::Sample – would run: docker login <registry>"

      - name: Build & push Public API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.PublicApi
          push: false
          tags: |
            bupa-books-public-api:${{ github.sha }}
            bupa-books-public-api:${{ inputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}

    steps:
      - name: Deploy Public API
        run: |
          echo "Deploying bupa-books-public-api:${{ github.sha }} to ${{ inputs.environment }}"
          echo "Sample – would pull image and restart service on target host"

      - name: Smoke test
        run: echo "Sample – would call GET /api/v1/books and assert HTTP 200"
